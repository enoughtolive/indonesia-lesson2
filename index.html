<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>기초 인도네시아어 2강</title>

<style>

body{
font-family:Arial, sans-serif;
background:#f5f7fb;
margin:0;
}

.wrap{
max-width:900px;
margin:auto;
padding:20px;
}

.hero{
background:#58cc02;
color:white;
padding:20px;
border-radius:20px;
margin-bottom:20px;
}

.section-title{
font-size:22px;
font-weight:bold;
margin:20px 0 10px 0;
}

.card{
background:white;
padding:15px;
border-radius:15px;
margin-bottom:15px;
box-shadow:0 4px 10px rgba(0,0,0,0.08);
}

.indo{
font-size:24px;
font-weight:bold;
margin-bottom:10px;
}

.line{
margin:5px 0;
}

button{
padding:8px 12px;
border:none;
border-radius:10px;
background:#58cc02;
color:white;
cursor:pointer;
}

.quiz{
background:white;
padding:20px;
border-radius:15px;
}

.answer-btn{
display:block;
margin:5px 0;
width:100%;
background:#eee;
color:black;
}

.correct{
background:#8ce99a;
}

.wrong{
background:#ffa8a8;
}

</style>
</head>

<body>

<div class="wrap">

<div class="hero">
<h1>기초 인도네시아어 2강</h1>
<p>정중한 표현 + 복음 연결</p>
</div>


<div class="section-title">생활 표현</div>

<div id="lessonGrid"></div>


<div class="section-title">복음 연결</div>

<div id="gospelGrid"></div>


<div class="section-title">퀴즈</div>

<div class="quiz">

<div id="question"></div>
<div id="answers"></div>
<div id="result"></div>

</div>


</div>


<script>

const lessons=[

{indo:"Permisi",ko:"쁘르미시",zh:"珀尔米西",meaning:"실례합니다"},
{indo:"Terima kasih",ko:"뜨리마 까시",zh:"特里玛 卡西",meaning:"감사합니다"},
{indo:"Terima kasih banyak",ko:"뜨리마 까시 반약",zh:"特里玛 卡西 巴尼亚",meaning:"대단히 감사합니다"},
{indo:"Maaf",ko:"마아프",zh:"马阿夫",meaning:"죄송합니다"},
{indo:"Maaf mengganggu",ko:"마아프 믕강구",zh:"马阿夫 蒙干古",meaning:"방해해서 죄송합니다"},
{indo:"Tidak apa-apa",ko:"띠닥 아빠 아빠",zh:"蒂达克 阿帕阿帕",meaning:"괜찮아요"},
{indo:"Silakan",ko:"실라칸",zh:"西拉坎",meaning:"부디 / 먼저 하세요"},
{indo:"Tolong",ko:"똘롱",zh:"托隆",meaning:"부탁합니다"}

]

const gospel=[

{indo:"Halo",ko:"할로",zh:"哈咯",meaning:"안녕하세요"},
{indo:"Saya dari Korea",ko:"사야 다리 코레아",zh:"萨亚 达里 韩国",meaning:"저는 한국에서 왔습니다"},
{indo:"Saya orang Kristen",ko:"사야 오랑 크리스텐",zh:"萨亚 欧朗 基督徒",meaning:"저는 크리스천입니다"},
{indo:"Saya ingin berbagi kabar baik",ko:"사야 잉인 브르바기 카바르 바이크",zh:"萨亚 因金 伯尔巴吉 卡巴尔 拜克",meaning:"좋은 소식을 나누고 싶습니다"},
{indo:"Tuhan mengasihi Anda",ko:"뚜한 믕아시히 안다",zh:"图汉 蒙阿西希 安达",meaning:"하나님이 당신을 사랑하십니다"}

]


const lessonGrid=document.getElementById("lessonGrid")

lessonGrid.innerHTML=lessons.map(l=>`

<div class="card">

<div class="indo">${l.indo}</div>

<div class="line">한글 발음 : ${l.ko}</div>
<div class="line">중국어 발음 : ${l.zh}</div>
<div class="line">뜻 : ${l.meaning}</div>

<button onclick="speak('${l.indo}')">🔊 듣기</button>

</div>

`).join("")



const gospelGrid=document.getElementById("gospelGrid")

gospelGrid.innerHTML=gospel.map(l=>`

<div class="card">

<div class="indo">${l.indo}</div>

<div class="line">한글 발음 : ${l.ko}</div>
<div class="line">중국어 발음 : ${l.zh}</div>
<div class="line">뜻 : ${l.meaning}</div>

<button onclick="speak('${l.indo}')">🔊 듣기</button>

</div>

`).join("")



function speak(text){

const utter=new SpeechSynthesisUtterance(text)
utter.lang="id-ID"
speechSynthesis.speak(utter)

}



const quiz=[

{q:"Permisi 뜻은?",options:["감사합니다","실례합니다","죄송합니다"],a:"실례합니다"},

{q:"Terima kasih 뜻은?",options:["감사합니다","안녕하세요","괜찮아요"],a:"감사합니다"},

{q:"Saya dari Korea 뜻은?",options:["저는 한국에서 왔습니다","저는 학생입니다","저는 목사입니다"],a:"저는 한국에서 왔습니다"},

{q:"Tuhan mengasihi Anda 뜻은?",options:["하나님이 당신을 사랑하십니다","하나님이 계십니다","기도합시다"],a:"하나님이 당신을 사랑하십니다"}

]

let current=0

const question=document.getElementById("question")
const answers=document.getElementById("answers")
const result=document.getElementById("result")


function loadQuiz(){

const q=quiz[current]

question.innerText=q.q

answers.innerHTML=q.options.map(o=>`

<button class="answer-btn" onclick="checkAnswer(this,'${o}')">${o}</button>

`).join("")

}

function checkAnswer(btn,selected){

const q=quiz[current]

if(selected===q.a){

btn.classList.add("correct")
result.innerText="정답!"

}else{

btn.classList.add("wrong")
result.innerText="정답 : "+q.a

}

current++

if(current<quiz.length){

setTimeout(()=>{

result.innerText=""
loadQuiz()

},1200)

}

}

loadQuiz()

</script>

</body>
</html>
