<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>기초 인도네시아어 2강</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans KR", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: #f5f7fb;
      color: #1f2937;
    }

    .wrap {
      max-width: 920px;
      margin: 0 auto;
      padding: 20px 16px 60px;
    }

    .hero {
      background: linear-gradient(180deg, #58cc02, #46b000);
      color: white;
      border-radius: 24px;
      padding: 24px 20px;
      box-shadow: 0 10px 24px rgba(70, 176, 0, 0.25);
      margin-bottom: 20px;
    }

    .hero h1 {
      margin: 0 0 8px;
      font-size: 30px;
      line-height: 1.2;
    }

    .hero p {
      margin: 0;
      font-size: 15px;
      line-height: 1.6;
      opacity: 0.96;
    }

    .section-title {
      font-size: 22px;
      font-weight: 800;
      margin: 24px 0 14px;
    }

    .lesson-grid {
      display: grid;
      gap: 16px;
    }

    .card {
      background: white;
      border-radius: 22px;
      padding: 18px;
      border: 1px solid #e5e7eb;
      box-shadow: 0 6px 18px rgba(17, 24, 39, 0.06);
    }

    .badge {
      display: inline-block;
      background: #ecfdf3;
      color: #15803d;
      border: 1px solid #bbf7d0;
      border-radius: 999px;
      padding: 5px 10px;
      font-size: 12px;
      font-weight: 700;
      margin-bottom: 12px;
    }

    .indo {
      font-size: 28px;
      font-weight: 800;
      color: #111827;
      margin-bottom: 12px;
    }

    .line {
      font-size: 16px;
      line-height: 1.7;
      margin: 5px 0;
    }

    .label {
      display: inline-block;
      min-width: 100px;
      color: #6b7280;
      font-weight: 700;
    }

    .btns {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 14px;
    }

    button {
      border: none;
      border-radius: 14px;
      padding: 12px 16px;
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
    }

    .play-btn {
      background: #58cc02;
      color: white;
      box-shadow: 0 4px 0 #3d8f00;
    }

    .slow-btn {
      background: #eef2ff;
      color: #3730a3;
      box-shadow: 0 4px 0 #c7d2fe;
    }

    .quiz-wrap {
      margin-top: 28px;
    }

    .quiz-card {
      background: white;
      border-radius: 22px;
      padding: 20px;
      border: 1px solid #e5e7eb;
      box-shadow: 0 6px 18px rgba(17, 24, 39, 0.06);
    }

    .progress-text {
      font-size: 14px;
      font-weight: 800;
      color: #4b5563;
      margin-bottom: 14px;
    }

    .progress-bar {
      width: 100%;
      height: 12px;
      background: #e5e7eb;
      border-radius: 999px;
      overflow: hidden;
      margin-bottom: 16px;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: #58cc02;
      transition: width 0.3s ease;
    }

    .question {
      font-size: 22px;
      font-weight: 800;
      line-height: 1.5;
      margin-bottom: 14px;
    }

    .answers {
      display: grid;
      gap: 10px;
    }

    .answer-btn {
      background: white;
      color: #111827;
      border: 2px solid #d1d5db;
      border-radius: 16px;
      padding: 14px 16px;
      text-align: left;
      box-shadow: none;
      font-weight: 700;
    }

    .answer-btn.correct {
      background: #ecfdf3;
      border-color: #22c55e;
      color: #166534;
    }

    .answer-btn.wrong {
      background: #fef2f2;
      border-color: #ef4444;
      color: #991b1b;
    }

    .result {
      margin-top: 14px;
      font-weight: 800;
      font-size: 16px;
      min-height: 24px;
    }

    .next-btn, .restart-btn {
      margin-top: 14px;
      background: #1f2937;
      color: white;
      box-shadow: 0 4px 0 #111827;
    }

    .tip {
      margin-top: 18px;
      background: #fff7ed;
      border: 1px solid #fed7aa;
      border-radius: 16px;
      padding: 14px 16px;
      color: #9a3412;
      line-height: 1.7;
      font-size: 14px;
    }

    @media (max-width: 640px) {
      .hero h1 {
        font-size: 26px;
      }
      .indo {
        font-size: 24px;
      }
      .question {
        font-size: 19px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="hero">
      <h1>기초 인도네시아어 2강</h1>
      <p>정중한 표현 + 새로운 단어 배우기 + 복음 연결 대화</p>
    </div>

    <div class="section-title">정중한 표현</div>
    <div class="lesson-grid" id="politeGrid"></div>

    <div class="section-title">새로운 단어 배우기</div>
    <div class="lesson-grid" id="wordGrid"></div>

    <div class="section-title">복음 연결 대화</div>
    <div class="lesson-grid" id="gospelGrid"></div>

    <div class="quiz-wrap">
      <div class="section-title">간단 퀴즈</div>
      <div class="quiz-card">
        <div class="progress-text" id="progressText">1 / 5</div>
        <div class="progress-bar">
          <div class="progress-fill" id="progressFill"></div>
        </div>

        <div class="question" id="questionBox"></div>
        <div class="answers" id="answersBox"></div>
        <div class="result" id="resultBox"></div>
        <div id="nextArea"></div>
      </div>

      <div class="tip">
        뜻은 한국어 / 중국어로 함께 표기했습니다. 음성은 브라우저 기본 TTS를 사용하므로 기기마다 조금 다르게 들릴 수 있습니다.
      </div>
    </div>
  </div>

  <script>
    const politeExpressions = [
      { badge: "정중 표현", indo: "Permisi", ko: "쁘르미시", zh: "珀尔米西", meaning: "실례합니다 / 打扰一下" },
      { badge: "정중 표현", indo: "Terima kasih", ko: "뜨리마 까시", zh: "特里玛 卡西", meaning: "감사합니다 / 谢谢" },
      { badge: "정중 표현", indo: "Maaf", ko: "마아프", zh: "马阿夫", meaning: "죄송합니다 / 对不起" },
      { badge: "정중 표현", indo: "Maaf mengganggu", ko: "마아프 믕강구", zh: "马阿夫 蒙干古", meaning: "방해해서 죄송합니다 / 打扰了很抱歉" },
      { badge: "정중 표현", indo: "Tidak apa-apa", ko: "띠닥 아빠 아빠", zh: "蒂达克 阿帕阿帕", meaning: "괜찮아요 / 没关系" }
    ];

    const newWords = [
      { badge: "새 단어", indo: "kabar baik", ko: "카바르 바이크", zh: "卡巴尔 拜克", meaning: "좋은 소식 / 好消息" },
      { badge: "새 단어", indo: "berbagi", ko: "버르바기", zh: "贝尔巴吉", meaning: "나누다 / 分享" },
      { badge: "새 단어", indo: "dari", ko: "다리", zh: "达里", meaning: "~에서 / ~로부터 / ~출신의 / 从… 来自…" },
      { badge: "새 단어", indo: "orang", ko: "오랑", zh: "欧朗", meaning: "사람 / 人" },
      { badge: "새 단어", indo: "Korea", ko: "코레아", zh: "韩国", meaning: "한국 / 韩国" },
      { badge: "새 단어", indo: "Tiongkok", ko: "띠옹꼭", zh: "中国", meaning: "중국 / 中国" },
      { badge: "새 단어", indo: "Tuhan", ko: "뚜한", zh: "图汉", meaning: "하나님 / 上帝" },
      { badge: "새 단어", indo: "Yesus", ko: "예수스", zh: "耶稣斯", meaning: "예수님 / 耶稣" },
      { badge: "새 단어", indo: "Kristen", ko: "크리스텐", zh: "基督徒", meaning: "크리스천 / 基督徒" },
      { badge: "새 단어", indo: "percaya", ko: "쁘르짜야", zh: "珀尔查亚", meaning: "믿다 / 相信" },
      { badge: "새 단어", indo: "berbicara", ko: "버르비차라", zh: "贝尔比查拉", meaning: "이야기하다 / 대화하다 / 说话" },
      { badge: "새 단어", indo: "bolehkah", ko: "볼레까", zh: "博雷卡", meaning: "~해도 될까요 / 可以吗" }
    ];

    const gospelLines = [
      { badge: "복음 연결", indo: "Halo", ko: "할로", zh: "哈咯", meaning: "안녕하세요 / 你好" },
      { badge: "복음 연결", indo: "Maaf mengganggu", ko: "마아프 믕강구", zh: "马阿夫 蒙干古", meaning: "방해해서 죄송합니다 / 打扰了很抱歉" },
      { badge: "복음 연결", indo: "Bolehkah saya berbicara sebentar?", ko: "볼레까 사야 버르비차라 스븐따르", zh: "博雷卡 萨亚 贝尔比查拉 瑟本塔尔", meaning: "잠깐 이야기해도 될까요 / 可以聊一下吗" },
      { badge: "복음 연결", indo: "Saya ingin berbagi kabar baik", ko: "사야 잉인 버르바기 카바르 바이크", zh: "萨亚 因金 贝尔巴吉 卡巴尔 拜克", meaning: "좋은 소식을 나누고 싶습니다 / 我想分享好消息" },
      { badge: "복음 연결", indo: "Saya dari Korea", ko: "사야 다리 코레아", zh: "萨亚 达里 韩国", meaning: "저는 한국에서 왔습니다 / 我来自韩国" },
      { badge: "복음 연결", indo: "Saya dari Tiongkok", ko: "사야 다리 띠옹꼭", zh: "萨亚 达里 中国", meaning: "저는 중국에서 왔습니다 / 我来自中国" },
      { badge: "복음 연결", indo: "Saya orang Kristen", ko: "사야 오랑 크리스텐", zh: "萨亚 欧朗 基督徒", meaning: "저는 크리스천입니다 / 我是基督徒" },
      { badge: "복음 연결", indo: "Tuhan mengasihi Anda", ko: "뚜한 믕아시히 안다", zh: "图汉 蒙阿西希 安达", meaning: "하나님이 당신을 사랑하십니다 / 上帝爱你" },
      { badge: "복음 연결", indo: "Yesus juga mengasihi Anda", ko: "예수스 주가 믕아시히 안다", zh: "耶稣斯 朱加 蒙阿西希 安达", meaning: "예수님도 당신을 사랑하십니다 / 耶稣也爱你" },
      { badge: "복음 연결", indo: "Apakah Anda percaya kepada Tuhan?", ko: "아빠까 안다 쁘르짜야 끄빠다 뚜한", zh: "阿帕卡 安达 珀尔查亚 克帕达 图汉", meaning: "하나님을 믿으시나요 / 你相信上帝吗" }
    ];

    function createCards(data, targetId) {
      const target = document.getElementById(targetId);
      target.innerHTML = data.map(item => `
        <div class="card">
          <div class="badge">${item.badge}</div>
          <div class="indo">${item.indo}</div>
          <div class="line"><span class="label">한글 발음</span>${item.ko}</div>
          <div class="line"><span class="label">中文发音</span>${item.zh}</div>
          <div class="line"><span class="label">뜻</span>${item.meaning}</div>
          <div class="btns">
            <button class="play-btn" onclick="speak('${item.indo.replace(/'/g, "\\'")}', 0.9)">🔊 듣기</button>
            <button class="slow-btn" onclick="speak('${item.indo.replace(/'/g, "\\'")}', 0.65)">🐢 천천히</button>
          </div>
        </div>
      `).join("");
    }

    createCards(politeExpressions, "politeGrid");
    createCards(newWords, "wordGrid");
    createCards(gospelLines, "gospelGrid");

    function getVoice() {
      const voices = speechSynthesis.getVoices();
      return voices.find(v => v.lang && v.lang.toLowerCase().startsWith("id")) ||
             voices.find(v => v.lang && v.lang.toLowerCase().startsWith("ms")) ||
             voices.find(v => v.lang && v.lang.toLowerCase().startsWith("en"));
    }

    function speak(text, rate = 0.9) {
      if (!("speechSynthesis" in window)) {
        alert("이 브라우저는 음성 재생을 지원하지 않습니다.");
        return;
      }
      speechSynthesis.cancel();
      const utter = new SpeechSynthesisUtterance(text);
      const voice = getVoice();
      if (voice) utter.voice = voice;
      utter.lang = voice?.lang || "id-ID";
      utter.rate = rate;
      utter.pitch = 1;
      speechSynthesis.speak(utter);
    }

    if ("speechSynthesis" in window) {
      window.speechSynthesis.onvoiceschanged = () => {};
      window.addEventListener("load", () => {
        speechSynthesis.getVoices();
      });
    }

    const quizData = [
      {
        question: "Permisi 뜻은 무엇일까요?",
        options: ["감사합니다", "실례합니다", "괜찮아요"],
        answer: "실례합니다"
      },
      {
        question: "Maaf mengganggu 뜻은 무엇일까요?",
        options: ["방해해서 죄송합니다", "좋은 소식을 나누고 싶습니다", "하나님을 믿으시나요"],
        answer: "방해해서 죄송합니다"
      },
      {
        question: "Saya dari Korea 뜻은 무엇일까요?",
        options: ["저는 한국에서 왔습니다", "저는 중국에서 왔습니다", "저는 크리스천입니다"],
        answer: "저는 한국에서 왔습니다"
      },
      {
        question: "Tuhan mengasihi Anda 뜻은 무엇일까요?",
        options: ["하나님이 당신을 사랑하십니다", "예수님도 당신을 사랑하십니다", "좋은 소식을 나누고 싶습니다"],
        answer: "하나님이 당신을 사랑하십니다"
      },
      {
        question: "Bolehkah saya berbicara sebentar? 뜻은 무엇일까요?",
        options: ["잠깐 이야기해도 될까요?", "저는 한국에서 왔습니다", "실례합니다"],
        answer: "잠깐 이야기해도 될까요?"
      }
    ];

    let current = 0;
    let score = 0;

    const questionBox = document.getElementById("questionBox");
    const answersBox = document.getElementById("answersBox");
    const resultBox = document.getElementById("resultBox");
    const nextArea = document.getElementById("nextArea");
    const progressText = document.getElementById("progressText");
    const progressFill = document.getElementById("progressFill");

    function updateProgress() {
      progressText.textContent = `${Math.min(current + 1, quizData.length)} / ${quizData.length}`;
      progressFill.style.width = `${(current / quizData.length) * 100}%`;
    }

    function renderQuiz() {
      if (current >= quizData.length) {
        progressText.textContent = "완료";
        progressFill.style.width = "100%";
        questionBox.textContent = `퀴즈 끝! 점수는 ${score} / ${quizData.length}`;
        answersBox.innerHTML = "";
        resultBox.textContent = score === quizData.length ? "정말 잘했어요! 🎉" : "좋아요. 다시 하면 더 잘할 수 있어요!";
        nextArea.innerHTML = `<button class="restart-btn" onclick="restartQuiz()">다시 하기</button>`;
        return;
      }

      updateProgress();

      const q = quizData[current];
      questionBox.textContent = q.question;
      resultBox.textContent = "";
      nextArea.innerHTML = "";

      answersBox.innerHTML = q.options.map(opt => `
        <button class="answer-btn" onclick="checkAnswer(this, '${opt.replace(/'/g, "\\'")}')">${opt}</button>
      `).join("");
    }

    function checkAnswer(button, selected) {
      const q = quizData[current];
      const buttons = document.querySelectorAll(".answer-btn");

      buttons.forEach(btn => btn.disabled = true);

      buttons.forEach(btn => {
        if (btn.textContent === q.answer) {
          btn.classList.add("correct");
        }
      });

      if (selected === q.answer) {
        score++;
        resultBox.textContent = "정답입니다!";
        button.classList.add("correct");
      } else {
        resultBox.textContent = `아쉬워요. 정답은 "${q.answer}" 입니다.`;
        button.classList.add("wrong");
      }

      nextArea.innerHTML = `<button class="next-btn" onclick="nextQuestion()">${current === quizData.length - 1 ? "결과 보기" : "다음 문제"}</button>`;
      progressFill.style.width = `${((current + 1) / quizData.length) * 100}%`;
    }

    function nextQuestion() {
      current++;
      renderQuiz();
    }

    function restartQuiz() {
      current = 0;
      score = 0;
      renderQuiz();
    }

    renderQuiz();
  </script>
</body>
</html>
