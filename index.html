<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>기초 인도네시아어 2강 - 정중한 표현과 복음 전하기</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans KR", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: #f5f7fb;
      color: #1f2937;
    }

    .wrap {
      max-width: 920px;
      margin: 0 auto;
      padding: 20px 16px 60px;
    }

    .hero {
      background: linear-gradient(180deg, #58cc02, #46b000);
      color: white;
      border-radius: 24px;
      padding: 24px 20px;
      box-shadow: 0 10px 24px rgba(70, 176, 0, 0.25);
      margin-bottom: 20px;
    }

    .hero h1 {
      margin: 0 0 8px;
      font-size: 30px;
      line-height: 1.2;
    }

    .hero p {
      margin: 0;
      font-size: 15px;
      line-height: 1.6;
      opacity: 0.96;
    }

    .section-title {
      font-size: 22px;
      font-weight: 800;
      margin: 24px 0 14px;
    }

    .lesson-grid {
      display: grid;
      gap: 16px;
    }

    .card {
      background: white;
      border-radius: 22px;
      padding: 18px;
      border: 1px solid #e5e7eb;
      box-shadow: 0 6px 18px rgba(17, 24, 39, 0.06);
    }

    .badge {
      display: inline-block;
      background: #ecfdf3;
      color: #15803d;
      border: 1px solid #bbf7d0;
      border-radius: 999px;
      padding: 5px 10px;
      font-size: 12px;
      font-weight: 700;
      margin-bottom: 12px;
    }

    .indo {
      font-size: 28px;
      font-weight: 800;
      color: #111827;
      margin-bottom: 12px;
    }

    .line {
      font-size: 16px;
      line-height: 1.7;
      margin: 5px 0;
    }

    .label {
      display: inline-block;
      min-width: 92px;
      color: #6b7280;
      font-weight: 700;
    }

    .btns {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 14px;
    }

    button {
      border: none;
      border-radius: 14px;
      padding: 12px 16px;
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
    }

    .play-btn {
      background: #58cc02;
      color: white;
      box-shadow: 0 4px 0 #3d8f00;
    }

    .slow-btn {
      background: #eef2ff;
      color: #3730a3;
      box-shadow: 0 4px 0 #c7d2fe;
    }

    .quiz-wrap {
      margin-top: 28px;
    }

    .quiz-card {
      background: white;
      border-radius: 22px;
      padding: 20px;
      border: 1px solid #e5e7eb;
      box-shadow: 0 6px 18px rgba(17, 24, 39, 0.06);
    }

    .quiz-top {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      margin-bottom: 14px;
    }

    .progress-text {
      font-size: 14px;
      font-weight: 800;
      color: #4b5563;
    }

    .progress-bar {
      width: 100%;
      height: 12px;
      background: #e5e7eb;
      border-radius: 999px;
      overflow: hidden;
      margin-bottom: 16px;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: #58cc02;
      transition: width 0.3s ease;
    }

    .question {
      font-size: 22px;
      font-weight: 800;
      line-height: 1.5;
      margin-bottom: 14px;
    }

    .answers {
      display: grid;
      gap: 10px;
    }

    .answer-btn {
      background: white;
      color: #111827;
      border: 2px solid #d1d5db;
      border-radius: 16px;
      padding: 14px 16px;
      text-align: left;
      box-shadow: none;
      font-weight: 700;
    }

    .answer-btn.correct {
      background: #ecfdf3;
      border-color: #22c55e;
      color: #166534;
    }

    .answer-btn.wrong {
      background: #fef2f2;
      border-color: #ef4444;
      color: #991b1b;
    }

    .result {
      margin-top: 14px;
      font-weight: 800;
      font-size: 16px;
      min-height: 24px;
    }

    .next-btn, .restart-btn {
      margin-top: 14px;
      background: #1f2937;
      color: white;
      box-shadow: 0 4px 0 #111827;
    }

    .tip {
      margin-top: 18px;
      background: #fff7ed;
      border: 1px solid #fed7aa;
      border-radius: 16px;
      padding: 14px 16px;
      color: #9a3412;
      line-height: 1.7;
      font-size: 14px;
    }

    @media (max-width: 640px) {
      .hero h1 {
        font-size: 26px;
      }
      .indo {
        font-size: 24px;
      }
      .question {
        font-size: 19px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="hero">
      <h1>기초 인도네시아어 2강</h1>
      <p>
        정중한 표현과 복음 전하기 · 인도네시아어 · 한글 발음 · 중국어 발음 · 뜻 · 듣기 · 퀴즈
      </p>
    </div>

    <div class="section-title">기본 표현 배우기</div>
    <div class="lesson-grid" id="lessonGrid"></div>

    <div class="quiz-wrap">
      <div class="section-title">간단 퀴즈</div>
      <div class="quiz-card">
        <div class="quiz-top">
          <div class="progress-text" id="progressText">1 / 5</div>
        </div>
        <div class="progress-bar">
          <div class="progress-fill" id="progressFill"></div>
        </div>

        <div class="question" id="questionBox"></div>
        <div class="answers" id="answersBox"></div>
        <div class="result" id="resultBox"></div>
        <div id="nextArea"></div>
      </div>

      <div class="tip">
        종교 관련 표현은 부드럽고 정중하게 연습하는 것이 좋습니다.
        중국어 발음 표기는 학습용 근사치입니다.
      </div>
    </div>
  </div>

  <script>
    const lessons = [
      {
        badge: "실례",
        indo: "Permisi",
        koPron: "쁘르미시",
        zhPron: "珀尔米西",
        meaning: "실례합니다"
      },
      {
        badge: "감사",
        indo: "Terima kasih",
        koPron: "뜨리마 까시",
        zhPron: "特里玛 卡西",
        meaning: "감사합니다"
      },
      {
        badge: "사과",
        indo: "Maaf",
        koPron: "마아프",
        zhPron: "马阿夫",
        meaning: "죄송합니다 / 미안합니다"
      },
      {
        badge: "응답",
        indo: "Tidak apa-apa",
        koPron: "띠닥 아빠 아빠",
        zhPron: "蒂达克 阿帕阿帕",
        meaning: "괜찮아요"
      },
      {
        badge: "복음",
        indo: "Tuhan mengasihi Anda",
        koPron: "뚜한 믕아시히 안다",
        zhPron: "图汉 蒙阿西希 安达",
        meaning: "하나님이 당신을 사랑하십니다"
      },
      {
        badge: "복음",
        indo: "Yesus mengasihi Anda",
        koPron: "예수스 믕아시히 안다",
        zhPron: "耶稣斯 蒙阿西希 安达",
        meaning: "예수님이 당신을 사랑하십니다"
      },
      {
        badge: "복음",
        indo: "Percayalah kepada Yesus",
        koPron: "쁘르짜얄라 끄빠다 예수스",
        zhPron: "珀尔查亚拉 克帕达 耶稣斯",
        meaning: "예수님을 믿어보세요"
      },
      {
        badge: "기도",
        indo: "Bolehkah saya berdoa untuk Anda?",
        koPron: "볼레까 사야 버르도아 운뚝 안다",
        zhPron: "博雷卡 萨亚 贝尔多阿 温图克 安达？",
        meaning: "당신을 위해 기도해도 될까요?"
      }
    ];

    const lessonGrid = document.getElementById("lessonGrid");

    function renderLessons() {
      lessonGrid.innerHTML = lessons.map(item => `
        <div class="card">
          <div class="badge">${item.badge}</div>
          <div class="indo">${item.indo}</div>
          <div class="line"><span class="label">한글 발음</span>${item.koPron}</div>
          <div class="line"><span class="label">中文发音</span>${item.zhPron}</div>
          <div class="line"><span class="label">뜻</span>${item.meaning}</div>
          <div class="btns">
            <button class="play-btn" onclick="speak('${item.indo.replace(/'/g, "\\'")}', 0.9)">🔊 듣기</button>
            <button class="slow-btn" onclick="speak('${item.indo.replace(/'/g, "\\'")}', 0.65)">🐢 천천히</button>
          </div>
        </div>
      `).join("");
    }

    function getVoice() {
      const voices = speechSynthesis.getVoices();
      return voices.find(v => v.lang && v.lang.toLowerCase().startsWith("id")) ||
             voices.find(v => v.lang && v.lang.toLowerCase().startsWith("ms")) ||
             voices.find(v => v.lang && v.lang.toLowerCase().startsWith("en"));
    }

    function speak(text, rate = 0.9) {
      if (!("speechSynthesis" in window)) {
        alert("이 브라우저는 음성 재생을 지원하지 않습니다.");
        return;
      }
      speechSynthesis.cancel();
      const utter = new SpeechSynthesisUtterance(text);
      const voice = getVoice();
      if (voice) utter.voice = voice;
      utter.lang = voice?.lang || "id-ID";
      utter.rate = rate;
      utter.pitch = 1;
      speechSynthesis.speak(utter);
    }

    if ("speechSynthesis" in window) {
      window.speechSynthesis.onvoiceschanged = () => {};
      window.addEventListener("load", () => {
        speechSynthesis.getVoices();
      });
    }

    const quizData = [
      {
        question: "‘하나님이 당신을 사랑하십니다’에 해당하는 표현은 무엇일까요?",
        options: ["Tuhan mengasihi Anda", "Terima kasih", "Tidak apa-apa"],
        answer: "Tuhan mengasihi Anda"
      },
      {
        question: "‘예수님을 믿어보세요’에 해당하는 표현은 무엇일까요?",
        options: ["Maaf", "Percayalah kepada Yesus", "Permisi"],
        answer: "Percayalah kepada Yesus"
      },
      {
        question: "‘당신을 위해 기도해도 될까요?’에 해당하는 표현은 무엇일까요?",
        options: ["Bolehkah saya berdoa untuk Anda?", "Yesus mengasihi Anda", "Terima kasih"],
        answer: "Bolehkah saya berdoa untuk Anda?"
      },
      {
        question: "‘실례합니다’에 해당하는 표현은 무엇일까요?",
        options: ["Permisi", "Maaf", "Tuhan mengasihi Anda"],
        answer: "Permisi"
      },
      {
        question: "‘괜찮아요’에 해당하는 표현은 무엇일까요?",
        options: ["Tidak apa-apa", "Percayalah kepada Yesus", "Terima kasih"],
        answer: "Tidak apa-apa"
      }
    ];

    let current = 0;
    let score = 0;

    const questionBox = document.getElementById("questionBox");
    const answersBox = document.getElementById("answersBox");
    const resultBox = document.getElementById("resultBox");
    const nextArea = document.getElementById("nextArea");
    const progressText = document.getElementById("progressText");
    const progressFill = document.getElementById("progressFill");

    function updateProgress() {
      progressText.textContent = `${Math.min(current + 1, quizData.length)} / ${quizData.length}`;
      progressFill.style.width = `${(current / quizData.length) * 100}%`;
    }

    function renderQuiz() {
      if (current >= quizData.length) {
        progressText.textContent = `완료`;
        progressFill.style.width = "100%";
        questionBox.textContent = `퀴즈 끝! 점수는 ${score} / ${quizData.length}`;
        answersBox.innerHTML = "";
        resultBox.textContent = score === quizData.length ? "정말 잘했어요! 🎉" : "좋아요. 다시 하면 더 잘할 수 있어요!";
        nextArea.innerHTML = `<button class="restart-btn" onclick="restartQuiz()">다시 하기</button>`;
        return;
      }

      updateProgress();

      const q = quizData[current];
      questionBox.textContent = q.question;
      resultBox.textContent = "";
      nextArea.innerHTML = "";

      answersBox.innerHTML = q.options.map(opt => `
        <button class="answer-btn" onclick="checkAnswer(this, '${opt.replace(/'/g, "\\'")}')">${opt}</button>
      `).join("");
    }

    function checkAnswer(button, selected) {
      const q = quizData[current];
      const buttons = document.querySelectorAll(".answer-btn");

      buttons.forEach(btn => btn.disabled = true);

      buttons.forEach(btn => {
        if (btn.textContent === q.answer) {
          btn.classList.add("correct");
        }
      });

      if (selected === q.answer) {
        score++;
        resultBox.textContent = "정답입니다!";
        button.classList.add("correct");
      } else {
        resultBox.textContent = `아쉬워요. 정답은 "${q.answer}" 입니다.`;
        button.classList.add("wrong");
      }

      nextArea.innerHTML = `<button class="next-btn" onclick="nextQuestion()">${current === quizData.length - 1 ? "결과 보기" : "다음 문제"}</button>`;
      progressFill.style.width = `${((current + 1) / quizData.length) * 100}%`;
    }

    function nextQuestion() {
      current++;
      renderQuiz();
    }

    function restartQuiz() {
      current = 0;
      score = 0;
      renderQuiz();
    }

    renderLessons();
    renderQuiz();
  </script>
</body>
</html>
